spring.application.name=art-backend

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/art_backend_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=mySuperSecure64CharacterJwtSecretKeyThatIsLongEnoughForHS256ProductionUse12345678901234567890
jwt.access.expiration=3600000
jwt.refresh.expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
